# Riff-raff
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = '''
for i = 1, jokers_to_create do
    local card = create_card('Joker', G.jokers, nil, 0, nil, nil, nil, 'rif')
    card:add_to_deck()
    G.jokers:emplace(card)
    card:start_materialize()
    G.GAME.joker_buffer = 0
end
'''
position = 'at'
match_indent = true
payload = '''
local playlog_cards = {}
for i = 1, jokers_to_create do
    local card = create_card('Joker', G.jokers, nil, 0, nil, nil, nil, 'rif')
    card:add_to_deck()
    G.jokers:emplace(card)
    card:start_materialize()
    G.GAME.joker_buffer = 0
    playlog_cards[#playlog_cards+1] = card
end
PlayLog.log{ type = "creates", card = self, created = playlog_cards }
'''

# Vampire
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = '''
v:set_ability(G.P_CENTERS.c_base, nil, true)
'''
position = 'at'
match_indent = true
payload = '''
local playlog_enhancement = v.config.center.key
v:set_ability(G.P_CENTERS.c_base, nil, true)
G.E_MANAGER:add_event(Event({
    func = function()
        PlayLog.log{ type = "removed_modifier", card = self, targets = { v }, enhancement = playlog_enhancement }
        return true
    end
}))
'''


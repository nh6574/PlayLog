# Ramen, Turtle Bean, Popcorn, Gros Michel, Cavendish, Ice Cream, Seltzer
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = '''
SMODS.destroy_cards(self, nil, nil, true)
'''
position = 'after'
match_indent = true
payload = '''
G.E_MANAGER:add_event(Event({
    func = function()
        local types = {
            j_canvendish = "extinct",
            j_gros_michel = "extinct",
            j_ice_cream = "melted",
            j_selzer = "drank",
        }
        PlayLog.log{ type = "eaten", card = self, food_type = types[self.config.center_key] or "eaten" }
        return true
    end
}))
'''


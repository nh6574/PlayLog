# Midas Mask
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = '''
if #faces > 0 then
'''
position = 'after'
match_indent = true
payload = '''
    G.E_MANAGER:add_event(Event({
        func = function()
            PlayLog.log{ type = "converts", card = self, converted = faces, enhancement = "m_gold" }
            return true
        end
    }))

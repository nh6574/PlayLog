# Gift Card
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = '''
if self.ability.name == 'Gift Card' then
'''
position = 'after'
match_indent = true
payload = '''
    for _, joker in ipairs(G.jokers.cards) do
        if joker.set_cost then
            G.E_MANAGER:add_event(Event({
                func = function()
                    PlayLog.log{ type = "changed_sell_cost", card = joker, previous = joker.cost - self.ability.extra, current = joker.cost }
                    return true
                end
            }))
        end
    end
    for _, consumable in ipairs(G.consumeables.cards) do
        if consumable.set_cost then
            G.E_MANAGER:add_event(Event({
                func = function()
                    PlayLog.log{ type = "changed_sell_cost", card = consumable, previous = consumable.cost - self.ability.extra, current = consumable.cost }
                    return true
                end
            }))
        end
    end

'''

